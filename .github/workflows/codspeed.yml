name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow CodSpeed to trigger backtest performance analysis
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v0
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build the benchmark targets
        run: |
          cargo codspeed build --all-features \
            -p grafeo-common --bench arena_bench \
            -p grafeo-core --bench index_bench \
            -p grafeo-engine --bench query_bench \
                             --bench serialization_bench \
                             --bench regression_bench

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
